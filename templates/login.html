<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        LearnIQ | Login
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            background:#f8fafc;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .auth-container{
            width:100%;
            max-width:420px;
        }

        .auth-card{
            background:#ffffff;
            border:1px solid #e5e7eb;
            border-radius:24px;
            padding:40px;
            box-shadow:0 10px 25px rgba(0,0,0,0.04);
        }

        .logo{
            font-size:32px;
            font-weight:800;
            color:#0f172a;
            text-align:center;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#64748b;
            margin-bottom:35px;
            font-size:14px;
        }

        .form-label{
            font-weight:600;
            font-size:14px;
            margin-bottom:8px;
        }

        .form-control{
            border:1px solid #dbe2ea;
            border-radius:14px;
            padding:14px;
            font-size:14px;
        }

        .form-control:focus{
            border-color:#2563eb;
            box-shadow:0 0 0 4px rgba(37,99,235,0.08);
        }

        .btn-login{
            width:100%;
            background:#2563eb;
            border:none;
            border-radius:14px;
            padding:14px;
            font-weight:600;
            margin-top:10px;
        }

        .btn-login:hover{
            background:#1d4ed8;
        }

        .auth-footer{
            text-align:center;
            margin-top:25px;
            color:#64748b;
            font-size:14px;
        }

        .auth-footer a{
            text-decoration:none;
            color:#2563eb;
            font-weight:600;
        }

        .welcome-text{
            text-align:center;
            margin-bottom:30px;
        }

        .welcome-text h2{
            font-size:28px;
            font-weight:700;
            color:#0f172a;
            margin-bottom:10px;
        }

        .welcome-text p{
            color:#64748b;
            font-size:15px;
        }

    </style>

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <div class="logo">
                LearnIQ
            </div>

            <p class="subtitle">
                Learning Analytics Platform
            </p>

            <div class="welcome-text">

                <h2>
                    Welcome Back
                </h2>

                <p>
                    Continue your learning journey.
                </p>

            </div>

            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert" style="border-radius: 14px; font-size: 14px; margin-bottom: 25px;">
                {{ error }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endif %}

            <form action="/login"
                  method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        value="{{ username if username else '' }}"
                        required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary btn-login text-white"
                    id="loginBtn">
                    <span class="spinner-border spinner-border-sm d-none" id="loginSpinner" role="status" aria-hidden="true"></span>
                    <span id="loginText">Sign In</span>
                </button>

            </form>

            <div class="auth-footer">

                Don't have an account?

                <a href="/register">
                    Create Account
                </a>

            </div>

        </div>

    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Login Button Spinner Script -->
    <script>
        const form = document.querySelector('form');
        const loginBtn = document.getElementById('loginBtn');
        const loginSpinner = document.getElementById('loginSpinner');
        const loginText = document.getElementById('loginText');

        if (form && loginBtn) {
            form.addEventListener('submit', function() {
                loginBtn.disabled = true;
                if (loginSpinner) loginSpinner.classList.remove('d-none');
                if (loginText) loginText.innerText = ' Signing In...';
            });
        }
    </script>

</body>

</html>
